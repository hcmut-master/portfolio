<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc" rx="12"/>
  <text x="400" y="40" font-family="sans-serif" font-size="20" font-weight="bold" fill="#0f172a" text-anchor="middle">Dataset Class Distribution</text>
  
  <!-- Grid lines -->
  <line x1="80" y1="100" x2="750" y2="100" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="80" y1="175" x2="750" y2="175" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="80" y1="250" x2="750" y2="250" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="80" y1="325" x2="750" y2="325" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Bars -->
  <rect x="100" y="100" width="60" height="250" fill="#3b82f6" rx="4"/>
  <rect x="200" y="150" width="60" height="200" fill="#3b82f6" rx="4"/>
  <rect x="300" y="80" width="60" height="270" fill="#3b82f6" rx="4"/>
  <rect x="400" y="200" width="60" height="150" fill="#3b82f6" rx="4"/>
  <rect x="500" y="120" width="60" height="230" fill="#3b82f6" rx="4"/>
  <rect x="600" y="280" width="60" height="70" fill="#ef4444" rx="4"/> <!-- Rare Pathogen -->
  
  <!-- Labels -->
  <text x="130" y="370" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Class A</text>
  <text x="230" y="370" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Class B</text>
  <text x="330" y="370" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Class C</text>
  <text x="430" y="370" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Class D</text>
  <text x="530" y="370" font-family="sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Class E</text>
  <text x="630" y="370" font-family="sans-serif" font-size="14" fill="#ef4444" font-weight="bold" text-anchor="middle">Rare</text>
</svg>
